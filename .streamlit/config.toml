[theme]
primaryColor = "#64ffda"
backgroundColor = "#0a0a1a"
secondaryBackgroundColor = "#0f0f2e"
textColor = "#ccd6f6"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#0a0a1a"
secondaryBackgroundColor = "#111126"
textColor = "#c7d2fe"
primaryColor = "#64ffda"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 10
maxMessageSize = 500
runOnSave = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false

[logger]
level = "error"
