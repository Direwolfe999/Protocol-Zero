[theme]
primaryColor = "#3ec9ad"
backgroundColor = "#060612"
secondaryBackgroundColor = "#0c0c1f"
textColor = "#ccd6f6"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#0a0a1a"
secondaryBackgroundColor = "#111126"
textColor = "#c7d2fe"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 10
maxMessageSize = 500

[browser]
gatherUsageStats = false
